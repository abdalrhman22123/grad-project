<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة تسجيل الدخول</title>
    <link rel="stylesheet" href="login.css">
</head>
<body dir="rtl">
    <div class="container">
        <div class="image-section">
            <img src="image 22.svg" alt="لوحة قيادة السيارة" class="background-image">
            <div class="gradient-overlay"></div>
        </div>

        <div class="form-section">
            <div class="form-wrapper">
                <h1 class="title">تسجيل الدخول</h1>

                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="email" class="form-label">البريد الإلكتروني</label>
                        <input 
                            type="email" 
                            id="email" 
                            class="form-input" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">كلمة المرور</label>
                        <input 
                            type="password" 
                            id="password" 
                            class="form-input" 
                            required
                        >
                    </div>

                    <div class="button-wrapper">
                        <a href="Home.html"><button type="submit" class="submit-button">إرسال</button></a>
                    </div>
                </form>

                <div class="signup-section">
                    <p class="signup-text">ليس لديك حساب؟</p>
                    <button class="signup-link">إنشاء حساب</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
